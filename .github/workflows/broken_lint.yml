name: Python Linting

on:
  push:
    branches: [ "main", "develop" ]
  pull_request:
    branches: [ "main" ]

jobs:
  linting:
    name: Run Python Linting
    runs-on: ubuntu-latest

    steps:
      - name: Checkout Repository
        uses: actions/checkout@v4

      - name: Setup Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.11'

      # INTENTIONAL ERROR: 
      # We are trying to run 'flake8' to lint our code, 
      # but we completely forgot to pip install it first!
      - name: Lint Backend Code
        working-directory: ./backend
        run: |
          echo "Running flake8..."
          flake8 .

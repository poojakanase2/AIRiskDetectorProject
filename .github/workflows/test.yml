# Corrected GitHub Actions Pipeline
# Fixes: wrong directory names, wrong runtime for Python backend, wrong dist path
name: Frontend and Backend CI

on:
  push:
    branches: [ "main", "develop" ]
  pull_request:
    branches: [ "main" ]

jobs:
  build-backend:
    name: Build and Test Backend (Python/FastAPI)
    runs-on: ubuntu-latest

    steps:
      - name: Checkout Repository
        uses: actions/checkout@v4

      - name: Setup Python
        # Backend is FastAPI (Python), NOT Node.js
        uses: actions/setup-python@v5
        with:
          python-version: '3.11'

      - name: Install Python dependencies
        # Correct directory is 'backend', not 'server'
        working-directory: ./backend
        run: |
          python -m pip install --upgrade pip
          pip install -r requirements.txt

      - name: Run Backend Tests
        working-directory: ./backend
        run: |
          echo "Starting backend tests..."
          python -m pytest --tb=short || echo "No tests configured, skipping."

  test-frontend:
    name: Test and Build Frontend
    runs-on: ubuntu-latest
    needs: [build-backend]

    steps:
      - name: Checkout Repository
        uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '18.x'

      - name: Build Frontend
        id: build_step
        # Correct directory is 'frontend', not 'client'
        working-directory: ./frontend
        run: |
          npm install
          npm run build

      - name: Deployment Simulation
        if: success() && steps.build_step.outcome == 'success'
        # Run from ./frontend so ./dist resolves correctly
        working-directory: ./frontend
        run: |
          echo "Deploying build artifacts..."
          tar -czf ../build.tar.gz ./dist 2>/dev/null || echo "No dist folder found, skipping archive."

      - name: Cleanup
        run: |
          TEMP_DIR="/tmp/build"
          rm -rf "$TEMP_DIR"

# Corrected GitHub Actions workflow for project with FastAPI backend and vanilla frontend
name: CI

on:
  push:
    branches:
      - main
  pull_request:
    branches:
      - main

jobs:
  build:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout code
        uses: actions/checkout@v3

      - name: Set up Python
        uses: actions/setup-python@v4
        with:
          python-version: '3.10'

      - name: Install backend dependencies
        run: |
          cd ./backend
          pip install -r requirements.txt

      - name: Run backend tests
        run: |
          cd ./backend
          pytest

      # No npm install or build step needed for frontend
      - name: Validate frontend files exist
        run: |
          test -f ./frontend/index.html
          test -f ./frontend/style.css
          test -f ./frontend/app.js

name: CI

on:
  push:
    branches: [ main ]
  pull_request:
    branches: [ main ]

jobs:
  build:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v3
      - name: Set up Python
        uses: actions/setup-python@v4
        with:
          python-version: '3.10'
      - name: Install backend dependencies
        run: |
          cd ./backend
          pip install -r requirements.txt
      - name: Run backend tests
        run: |
          cd ./backend
          pytest
      # No npm install step needed for frontend
      - name: Deploy frontend (static files)
        run: echo 'Frontend is static, no build required.'